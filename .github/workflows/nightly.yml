name: nightly
on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch: {}

jobs:
  slow-and-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      MPLBACKEND: Agg
      JAX_PLATFORMS: cpu
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --all-extras --frozen
      - run: uv run pytest -m slow -q
      - run: uv run python scripts/run_pipeline.py profile=dev
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-dev-report
          path: |
            reports/FINDINGS.md
            reports/figures/**
            reports/run_manifest.json
