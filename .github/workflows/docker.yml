name: docker
on:
  push:
    tags: ["v*"]

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker build -f docker/Dockerfile -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
      - run: |
          docker build -f docker/Dockerfile.cuda -t ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cuda .
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}-cuda
