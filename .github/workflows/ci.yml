name: ci
on: { push: { branches: [main] }, pull_request: {} }

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix: { python: ["3.11", "3.12"] }
    env:
      MPLBACKEND: Agg
      JAX_PLATFORMS: cpu
      PYTHONHASHSEED: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - run: uv python install ${{ matrix.python }}
      # The fast suite exercises optional-backend features (PettingZoo MARL env,
      # SB3 agents, optuna sensitivity, arviz diagnostics) — importing
      # simworld.agents / simworld.environments pulls those backends in — so it
      # needs the full extras, the same install `make setup` performs locally.
      - run: uv sync --all-extras --frozen
      - run: make lint
      - run: make typecheck
      - run: make test
      - run: make smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-py${{ matrix.python }}
          path: |
            reports/FINDINGS.md
            reports/figures/**

  docker:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile -t simworld:ci .
      - run: docker run --rm simworld:ci python scripts/run_pipeline.py profile=smoke
