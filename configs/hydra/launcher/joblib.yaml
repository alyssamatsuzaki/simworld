# hydra-joblib-launcher (slurm extra): process-parallel sweeps on one fat node (§6, §12).
# Mirrors the plugin's registered JobLibLauncherConf defaults.
_target_: hydra_plugins.hydra_joblib_launcher.joblib_launcher.JoblibLauncher
n_jobs: -1              # all CPUs
backend: null           # inferred from prefer/require
prefer: processes
require: null
verbose: 0
timeout: null
pre_dispatch: 2*n_jobs
batch_size: auto
temp_folder: null
max_nbytes: null
mmap_mode: r
