services:
  dashboard:
    build: { context: .., dockerfile: docker/Dockerfile }
    command: streamlit run scripts/dashboard.py --server.headless true --server.port 8501 --server.address 0.0.0.0
    ports: ["8501:8501"]
    volumes: ["../artifacts:/work/artifacts", "../reports:/work/reports"]
  mlflow:
    build: { context: .., dockerfile: docker/Dockerfile }
    command: mlflow ui --backend-store-uri file:/work/experiments/mlruns --host 0.0.0.0 --port 5000
    ports: ["5000:5000"]
    volumes: ["../experiments:/work/experiments"]
